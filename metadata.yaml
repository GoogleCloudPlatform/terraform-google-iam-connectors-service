apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-iam-connectors-service
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: terraform-google-iam-connectors-service
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-iam-connectors-service.git
      sourceType: git
    version: 0.1.2
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
  content:
    examples:
      - name: simple_example
        location: examples/simple_example
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project to create the connector in.
        varType: string
        required: true
      - name: location
        description: The location of the resource.
        varType: string
        required: true
      - name: connector_id
        description: The name of the connector.
        varType: string
        required: true
      - name: description
        description: The description of the resource.
        varType: string
      - name: allowed_scopes
        description: List of scopes that are allowed to be requested for this connector.
        varType: list(string)
        defaultValue: []
      - name: blocked_scopes
        description: List of scopes that are blocked from being requested for this connector.
        varType: list(string)
        defaultValue: []
      - name: api_key_params
        description: API Key connector type parameters.
        varType: |-
          object({
              api_key = string
            })
      - name: three_legged_oauth_params
        description: Three-legged OAuth connector type parameters.
        varType: |-
          object({
              client_id         = string
              client_secret     = string
              authorization_url = string
              token_url         = string
              enable_pkce       = bool
            })
      - name: two_legged_oauth_params
        description: Two-legged OAuth connector type parameters.
        varType: |-
          object({
              client_id      = string
              client_secret  = string
              token_endpoint = string
            })
      - name: ge_connector_params
        description: Gemini Enterprise connector type parameters. Set to an empty object to enable.
        varType: any
      - name: state
        description: The state of the connector. Can be ENABLED or DISABLED.
        varType: string
        defaultValue: ENABLED
    outputs:
      - name: connector
        description: The created IAM connector.
      - name: connector_id
        description: The ID of the created IAM connector.
      - name: connector_self_link
        description: The full resource name of the created IAM connector.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/connectors.admin
          - roles/iam.serviceAccountUser
          - roles/secretmanager.secretAccessor
          - roles/iamconnectors.admin
    services:
      - iamconnectors.googleapis.com
      - secretmanager.googleapis.com
    providerVersions:
      - source: hashicorp/google-nightly
        version: 2026.3.23-0.0.3
